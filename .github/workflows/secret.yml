name: Secret Scan

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

permissions:
  # Follow the principle of least privilege.
  contents: read
  pull-requests: write # Required to post comments on Pull Requests

concurrency:
  group: "secret-scan-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Compute scan range
        id: range
        shell: bash
        run: |
          set -euo pipefail

          default_branch="${{ github.event.repository.default_branch || 'main' }}"
          before_sha="${{ github.event.before || '' }}"
          created_ref="${{ github.event.created || false }}"
          git fetch --no-tags --prune origin "$default_branch"

          branch_scan_base() {
            local merge_base
            merge_base=$(git merge-base HEAD "origin/$default_branch" || true)
            if [[ -n "$merge_base" && "$merge_base" != "$(git rev-parse HEAD)" ]]; then
              echo "$merge_base"
            else
              git rev-list --max-parents=0 HEAD | tail -n 1
            fi
          }

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "scope=pull request range" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && -n "$before_sha" && "$before_sha" != "0000000000000000000000000000000000000000" ]]; then
            echo "base=$before_sha" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "scope=push delta" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && "$created_ref" == "true" ]]; then
            echo "base=$(branch_scan_base)" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "scope=full new branch history from fork point" >> "$GITHUB_OUTPUT"
          else
            echo "base=$(branch_scan_base)" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "scope=full branch history fallback" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Job Summary
        shell: bash
        run: |
          {
            echo "## 🛡️ Secret Scan Range"
            echo
            echo "- **Event**: ${{ github.event_name }}"
            echo "- **Scope**: ${{ steps.range.outputs.scope }}"
            echo "- **Base**: \`${{ steps.range.outputs.base }}\`"
            echo "- **Head**: \`${{ steps.range.outputs.head }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run TruffleHog on commit range
        id: scan
        uses: trufflesecurity/trufflehog@v3 # Pinned to v3 instead of @main for stability and security
        continue-on-error: true # Prevents the job from immediately failing so we can post the PR comment
        with:
          path: ./
          base: ${{ steps.range.outputs.base }}
          head: ${{ steps.range.outputs.head }}
          extra_args: --results=verified,unknown

      - name: Comment PR with Scan Results
        # Runs only on Pull Requests to report the outcome
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const outcome = '${{ steps.scan.outcome }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            let body = '';
            if (outcome === 'success') {
              body = `### ✅ Secret Scan Passed\n\nTruffleHog found no exposed secrets in this Pull Request. Great job keeping the codebase secure!`;
            } else {
              body = `### 🚨 Action Required: Potential Secrets Detected!\n\n> **Security Notice:** To prevent secondary leaks via GitHub email notifications, detailed secret information is not printed in this comment.\n\nPlease review the **[Action Logs](${runUrl})** for the detailed TruffleHog report and rotate any compromised credentials immediately.`;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Enforce Workflow Failure
        # Fails the entire job if TruffleHog found secrets, ensuring the PR is blocked
        if: steps.scan.outcome == 'failure'
        run: exit 1
