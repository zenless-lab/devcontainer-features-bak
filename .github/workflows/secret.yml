on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Secret Scanning
      uses: trufflesecurity/trufflehog@main
      with:
        extra_args: --results=verified,unknown

    - name: Output to Step Summary
      if: always()
      run: |
        if [[ "${{ steps.trufflehog.outcome }}" == "success" ]]; then
          echo "### ✅ TruffleHog Secret Scan Passed" >> $GITHUB_STEP_SUMMARY
          echo "Awesome! No leaked credentials (verified or unknown) were found in this scan." >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ TruffleHog Secret Scan Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Warning**: Potential leaked credentials were discovered. Please carefully review the GitHub Actions logs." >> $GITHUB_STEP_SUMMARY
        fi
